name: Auto Redeem

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, reopened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  redeem:
    if: (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'redeem')) || (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'redeem') && contains(github.event.comment.body, '/redeem'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Init DB
        run: python scripts/coin.py balance admin --init

      - name: Approve redemption
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: python scripts/redeem_issue.py

      - name: Auto payout via Binance
        if: success()
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python3 scripts/auto_payout.py

      - name: Mark as paid
        if: success()
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUM --repo ${{ github.repository }} --body "✅ 兑换已完成并打款。"
          gh issue close $ISSUE_NUM --repo ${{ github.repository }} --comment "已打款，关闭"

      - name: Comment result
        if: always()
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          cat redeem_result_*.json 2>/dev/null || echo "已处理"
