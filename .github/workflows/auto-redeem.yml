name: Auto Redeem

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  redeem:
    if: contains(github.event.issue.labels.*.name, 'redeem')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run coin.py redeem
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 scripts/redeem_issue.py

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('redeem_result.json', 'utf8'));
            let body;
            if (result.ok) {
              body = `## ✅ 兑换已自动批准\n\n| 项目 | 详情 |\n|------|------|\n| 用户 | ${result.username} |\n| 金额 | ${result.amount} 积分 = \$${result.cash_value} |\n| 地址 | \`${result.address}\` |\n| 余额 | ${result.balance_remaining} 积分 |\n\n💰 管理员请从资金池 \`0x321984374e41e1c8ba3e2b87ab050828cffd25c2\`（BSC BEP-20）打款。打款后回复 \`/paid\` 完成。`;
            } else if (result.error === 'insufficient_balance') {
              body = `❌ 余额不足（当前 ${result.balance}，需要 ${result.amount}）`;
            } else {
              body = `❌ 兑换失败: ${result.error || '未知错误'}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: body
            });
