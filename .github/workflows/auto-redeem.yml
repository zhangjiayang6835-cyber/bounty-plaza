name: Auto Redeem

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  redeem:
    if: contains(github.event.issue.labels.*.name, 'redeem')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Approve redemption
        id: approve
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 scripts/redeem_issue.py

      - name: Auto payout via Binance
        id: payout
        if: success()
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: |
          python3 -c "
import json
with open('redeem_result.json') as f:
    r = json.load(f)
if not r.get('ok'):
    print('SKIP: approval failed')
    exit(0)
addr = r.get('address', '')
amount = r.get('cash_value', 0)
if not addr or amount <= 0:
    print('SKIP: invalid address or amount')
    exit(0)
import subprocess, sys
result = subprocess.run([sys.executable, 'scripts/binance_withdraw.py', addr, str(amount)], capture_output=True, text=True, env={**__import__('os').environ})
print(result.stdout)
if 'withdraw_id' in result.stdout:
    import json as j
    data = j.loads(result.stdout)
    with open('payout_result.json', 'w') as f:
        j.dump(data, f)
    print('PAYOUT_SUCCESS')
else:
    print('PAYOUT_FAILED: ' + result.stderr[:200])
" 2>&1 | tee payout.log

      - name: Mark as paid
        if: success()
        run: |
          python3 -c "
import json
with open(f'payout_result_{os.environ["ISSUE_NUM"]}.json') as f:
    p = json.load(f)
if p.get('ok') or p.get('withdraw_id'):
    with open('redeem_result.json') as f:
        r = json.load(f)
    import subprocess
    result = subprocess.run(['python3', 'scripts/coin.py', 'pay', '--json', '--id', str(r.get('id', 0))], capture_output=True, text=True)
    print(result.stdout)
else:
    print('SKIP: payout did not succeed')
"

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync(`redeem_result_${context.issue.number}.json`, 'utf8'));
            const payout = fs.existsSync(`payout_result_${context.issue.number}.json`) ? JSON.parse(fs.readFileSync(`payout_result_${context.issue.number}.json`, 'utf8')) : null;
            const payoutSuccess = payout && (payout.ok || payout.withdraw_id);

            let body;
            if (!result.ok) {
              body = `❌ 兑换失败: ${result.error || '余额不足'}`;
            } else if (payoutSuccess) {
              body = `## ✅ 兑换已自动完成\n\n| 项目 | 详情 |\n|------|------|\n| 用户 | ${result.username} |\n| 金额 | ${result.amount} 积分 = \$${result.cash_value} |\n| 地址 | \`${result.address}\` |\n| 打款 | ✅ 已自动通过币安 API 打款（BSC BEP-20） |\n\n> 无需手动操作。`;
            } else {
              body = `## ⚠️ 审批通过，打款失败\n\n| 项目 | 详情 |\n|------|------|\n| 用户 | ${result.username} |\n| 金额 | ${result.amount} 积分 |\n| 地址 | \`${result.address}\` |\n\n请手动打款后回复 \`/paid\` 完成。`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: body
            });
