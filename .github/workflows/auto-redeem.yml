name: Auto Redeem
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_num:
        description: "Issue number"
        required: true
        default: "11"
jobs:
  redeem:
    if: github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'redeem') && contains(github.event.comment.body, '/redeem')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Init DB
        run: |
          python scripts/coin.py balance admin --init
          # 从持久化账本导入用户
          if [ -f data/seed_users.json ]; then
            python3 -c "
import json, sys
sys.path.insert(0, 'scripts')
import coin
conn = coin.get_db()
coin.init_db(conn)
with open('data/seed_users.json') as f:
    users = json.load(f)
for name, data in users.items():
    coin.ensure_account(conn, name)
    honey = data.get('total', 500)
    coin.ensure_account(conn, 'admin')
    admin_bal = coin.get_balance(conn, 'admin')
    if admin_bal >= honey and coin.get_balance(conn, name) == 0:
        tx_id = coin.transfer(conn, 'admin', name, honey, 'seed')
        print(f"  Seeded {name}: {honey} coins (tx #{tx_id})")
conn.close()
"
          fi

      - name: Auto payout via Binance
        if: success()
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: |
          python3 scripts/auto_payout.py

      - name: Mark as paid
        if: success()
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUM --repo ${{ github.repository }} --body "✅ 兑换已完成并打款，请查收。"
          gh issue close $ISSUE_NUM --repo ${{ github.repository }} --comment "已打款，关闭"

      - name: Approve
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: python scripts/redeem_issue.py
