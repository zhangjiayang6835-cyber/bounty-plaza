name: Award Coins

on:
  workflow_dispatch:
    inputs:
      submitter:
        description: "Contributor GitHub username"
        required: true
      score:
        description: "Quality score (0-100)"
        required: true
        default: "90"
      task:
        description: "Task ID or description"
        required: true

permissions:
  issues: write
  contents: write

jobs:
  award:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Award coins
        run: |
          echo "Awarding ${{ github.event.inputs.submitter }}"
          echo "Score: ${{ github.event.inputs.score }}"
          echo "Task: ${{ github.event.inputs.task }}"

          COINS=$(( ${{ github.event.inputs.score }} * 10 ))
          python scripts/coin.py transfer --from admin --to "${{ github.event.inputs.submitter }}" --amount $COINS --reason "Task: ${{ github.event.inputs.task }} (score ${{ github.event.inputs.score }})"

      - name: Update leaderboard
        run: python scripts/coin.py ledger
