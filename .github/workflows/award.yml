name: Award Coins

on:
  workflow_dispatch:
    inputs:
      submitter:
        description: "Contributor GitHub username"
        required: true
      score:
        description: "Quality score (0-100)"
        required: true
        default: "90"
      task:
        description: "Task ID or description"
        required: true

permissions:
  issues: write
  contents: write

jobs:
  award:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Award coins
        env:
          SUBMITTER: ${{ github.event.inputs.submitter }}
          SCORE: ${{ github.event.inputs.score }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          echo "Awarding $SUBMITTER"
          echo "Score: $SCORE"
          echo "Task: $TASK"

          COINS=$(( ${{ fromJSON(github.event.inputs.score) }} * 10 ))
          python scripts/coin.py transfer --from admin --to "$SUBMITTER" --amount $COINS --reason "Task: $TASK (score $SCORE)"

      - name: Update leaderboard
        run: python scripts/coin.py ledger
