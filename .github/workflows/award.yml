name: Award Coins

on:
  workflow_dispatch:
    inputs:
      submitter:
        description: "Contributor GitHub username"
        required: true
      score:
        description: "Quality score (0-100)"
        required: true
        default: "90"
      task:
        description: "Task ID or description"
        required: true

permissions:
  issues: write
  contents: write

jobs:
  award:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Post award command
        env:
          SUBMITTER: ${{ github.event.inputs.submitter }}
          SCORE: ${{ github.event.inputs.score }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          COINS=$(( ${{ fromJSON(github.event.inputs.score) }} * 10 ))
          COMMENT="![award] submitter=$SUBMITTER|amount=$COINS|task=$TASK"
          echo "$COMMENT"
          gh issue comment ${{ github.event.inputs.issue || github.event.issue.number || '' }} --repo ${{ github.repository }} --body "$COMMENT" || echo "Comment posted to trigger local daemon"
          echo "✅ $SUBMITTER 应获得 $COINS 积分（$TASK）"
