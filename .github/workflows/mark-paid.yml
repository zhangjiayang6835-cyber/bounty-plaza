name: Mark Paid

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  mark-paid:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/paid')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract redeem ID from issue
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Try to get redeem ID from issue body or comment
          ID=$(echo "$COMMENT" | grep -oP '/paid\s+(\d+)' | head -1 | grep -oP '\d+')
          if [ -z "$ID" ]; then
            # Look in issue body for "兑换号: #(\d+)"
            ID=$(echo "$ISSUE_BODY" | grep -oP '#(\d+)' | head -1 | grep -oP '\d+')
          fi
          echo "redeem_id=$ID" >> $GITHUB_OUTPUT

      - name: Mark as paid
        if: steps.parse.outputs.redeem_id != ''
        run: |
          ID="${{ steps.parse.outputs.redeem_id }}"
          echo "Marking redeem #$ID as paid"
          python scripts/coin.py pay --id "$ID" || echo "Already paid or not found"

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            const id = `${{ steps.parse.outputs.redeem_id }}`;
            let body;
            if (id) {
              body = `✅ 兑换 #${id} 已标记为已打款。\n\n如有问题请联系管理员。`;
            } else {
              body = `⚠️ 未找到兑换编号。请在 Issue 中回复 \`/paid <编号>\`，例如 \`/paid 12\``;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
