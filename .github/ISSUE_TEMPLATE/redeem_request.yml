name: 💰 兑换申请 / Redeem Request
description: 申请将积分兑换为现金
title: "[Redeem] "
labels: ["redeem"]
body:
  - type: input
    id: username
    attributes:
      label: 用户名 / Username
      description: 你的 GitHub 用户名
      placeholder: e.g. username
    validations:
      required: true
  - type: input
    id: amount
    attributes:
      label: 兑换数量 / Amount
      description: 你想兑换多少积分币？
      placeholder: e.g. 100
    validations:
      required: true
  - type: input
    id: address
    attributes:
      label: 收款地址 / Address
      description: PayPal 邮箱 或 USDT 地址
      placeholder: e.g. user@example.com 或 TYourTRONAddress
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## 兑换率
        1 积分 = 0.72 USD
        无最低兑换限制

        ## 说明
        提交后系统会自动审批，管理员后续安排打款。
