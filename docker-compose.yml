version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BOUNTY_API_KEY=${BOUNTY_API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
