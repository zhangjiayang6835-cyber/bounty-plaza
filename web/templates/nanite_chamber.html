{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Public Nanite Chamber</h1>

    <div class="row">
        <div class="col-md-6">
            <h2>Implant Nanites</h2>
            <form method="post" action="{% url 'implant_nanite' nanite_type.id %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="cloud_id">Cloud ID</label>
                    <input type="number" class="form-control" id="cloud_id" name="cloud_id" value="1">
                </div>
                <div class="form-group">
                    <label for="safety_threshold">Safety Threshold</label>
                    <input type="number" class="form-control" id="safety_threshold" name="safety_threshold" value="50">
                </div>
                <button type="submit" class="btn btn-primary">Implant</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
