http {
    # Other configurations...

    # Disable Transfer-Encoding: chunked when Content-Length is present
    map $http_content_length $disable_chunked {
        default 0;
        ""    1;
    }

    # Reject malformed Transfer-Encoding headers
    map $http_transfer_encoding $valid_transfer_encoding {
        default 0;
        "chunked" 1;
    }

    server {
        listen 443 ssl http2;
        server_name example.com;

        ssl_certificate /etc/nginx/ssl/example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/example.com.key;

        location / {
            # Other location configurations...

            # Check if Content-Length is present and disable Transfer-Encoding: chunked
            if ($disable_chunked = 1) {
                more_set_headers 'Transfer-Encoding: identity';
            }

            # Reject malformed Transfer-Encoding headers
            if ($valid_transfer_encoding = 0) {
                return 400 "Malformed Transfer-Encoding header";
            }

            # Your existing proxy_pass or other configurations
            proxy_pass http://backend;
        }
    }
}