http {
    # Enable HTTP/2
    http2 on;

    # Prevent HTTP/1.0 downgrade
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;

        ssl_certificate /etc/nginx/ssl/yourdomain.crt;
        ssl_certificate_key /etc/nginx/ssl/yourdomain.key;

        location / {
            # Proxy to the backend
            proxy_pass http://backend;

            # Reject requests with both Content-Length and Transfer-Encoding: chunked
            if ($http_content_length ~* ".*" && $http_transfer_encoding ~* "chunked") {
                return 400 "Bad Request: Both Content-Length and Transfer-Encoding: chunked are present.";
            }

            # Reject malformed Transfer-Encoding
            if ($http_transfer_encoding!~* "chunked|identity") {
                return 400 "Bad Request: Malformed Transfer-Encoding header.";
            }
        }
    }
}